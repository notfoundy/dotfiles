- name: Clone or update awww repository
  ansible.builtin.git:
    repo: "{{ awww.repos }}"
    dest: "{{ install_path }}/awww"
    version: "{{ awww.version }}"
    update: yes
  register: git_result
  become: true

- name: Define build_required
  ansible.builtin.set_fact:
    build_required: git_result.before != git_result.after

- name: Install build dependencies
  ansible.builtin.package:
    pkg:
      - lz4-devel
      - wayland-devel
      - wayland-protocols-devel
    state: present
  become: true
  when: build_required

- name: Build awww (release)
  ansible.builtin.command: cargo build --release --locked
  args:
    chdir: "{{ install_path }}/awww"
  become: true
  notify: Remove build dependencies
  when: build_required

- name: Install release binaries
  vars:
    binaries:
      - awww
      - awww-daemon
  ansible.builtin.copy:
    src: "{{ install_path }}/awww/target/release/{{ item }}"
    dest: "{{ bin_path }}/{{ item }}"
    mode: "0755"
    remote_src: true
  loop: "{{ binaries }}"
  become: true
  when: build_required

- name: Create awww config directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/hypr/scripts"
    state: directory

- name: Copy wallpaper script
  ansible.builtin.copy:
    src: "files/wallpaper.sh"
    dest: "{{ ansible_user_dir }}/.config/hypr/scripts/wallpaper.sh"
    mode: "0755"

- name: Copy wallpapers
  ansible.builtin.copy:
    src: "files/wallpapers"
    dest: "{{ ansible_user_dir }}/Pictures/Wallpapers"

