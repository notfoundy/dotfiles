- name: Enable Quickshell COPR
  community.general.copr:
    name: errornointernet/quickshell
    state: enabled
  become: true

- name: Update dnf cache
  ansible.builtin.dnf:
    update_cache: true
  become: true

- name: Install dependencies
  ansible.builtin.dnf:
    name: microtex
    state: present
  become: true
