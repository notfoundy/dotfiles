- name: Install Quickshell dependencies (Fedora)
  ansible.builtin.dnf:
    name:
      - gojq
      - python3-pillow
      - python3-pywayland
      - python3-psutil
      - hyprpicker
      - cliphist
      - ydotool
      - qt6-qt5compat
      - polkit-qt6-1-devel
      - qt6-qtbase-devel 
      - qt6-qtdeclarative-devel
      - qt6-qtpositioning
      - kf6-syntax-highlighting
      - kf6-kirigami
    state: present
  become: true
