- name: "Checking config for {{ ansible_distribution }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_distribution | lower }}.yml"
  register: distribution_config
  delegate_to: localhost

- name: "Run Tasks for {{ ansible_distribution }}"
  ansible.builtin.include_tasks: "{{ ansible_distribution | lower }}.yml"
  when: distribution_config.stat.exists

- name: Create build directory for end-4 dots
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.build/end-4-dots"
    state: directory
    mode: "0755"

- name: Clone end-4 dots (shallow clone)
  ansible.builtin.git:
    repo: "{{ desktop_shell.repo }}"
    dest: "{{ ansible_user_dir }}/.build/end-4-dots"
    version: "{{ desktop_shell.version }}"
    depth: 1
    update: yes

- name: Ensure .config/quickshell exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/quickshell"
    state: directory
    mode: "0755"

- name: Copy Quickshell and scripts from end-4 build
  ansible.builtin.copy:
    src: "{{ ansible_user_dir }}/.build/end-4-dots/.config/{{ item }}"
    dest: "{{ ansible_user_dir }}/.config/"
    remote_src: true
    force: true
  loop:
    - quickshell
    - hypr/scripts

- name: Deploy static theme file ({{ desktop_shell.theme }})
  ansible.builtin.copy:
    src: "themes/{{ desktop_shell.theme }}.lua"
    dest: "{{ ansible_user_dir }}/.config/quickshell/theme.lua"
    mode: "0644"

- name: Fix Quickshell color loading (Force static theme)
  ansible.builtin.lineinfile:
    path: "{{ ansible_user_dir }}/.config/quickshell/shell.lua"
    regexp: '^local colors = .*'
    line: 'local colors = require("theme")'
    state: present
  failed_when: false # On ne veut pas que le playbook échoue si le shell.lua est déjà configuré différemment.
